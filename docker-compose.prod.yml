services:
  # PHP-FPM Application Container
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: blog-przydan-app:latest
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://${DOMAIN:-laravel.przydan.org}
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-blog_prod}
      - DB_USERNAME=${DB_USERNAME:-blog_user}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password}
      - CACHE_STORE=database
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
      - LOG_CHANNEL=stderr # Recommended for Docker
    depends_on:
      db:
        condition: service_healthy

  # Nginx Web Server Container
  web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - .:/var/www/html:ro # App code (needed for static assets)
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # PostgreSQL Database Container
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-blog_prod}
      POSTGRES_USER: ${DB_USERNAME:-blog_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-blog_user} -d ${DB_DATABASE:-blog_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cloudflare Tunnel Connector
  # Before running: set your CLOUDFLARE_TUNNEL_TOKEN in your environment or .env
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web

volumes:
  db_data:
